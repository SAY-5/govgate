services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: govgate
      POSTGRES_PASSWORD: govgate
      POSTGRES_DB: govgate
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govgate"]
      interval: 2s
      timeout: 3s
      retries: 20

  register:
    build: ./apps/register
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOVGATE_DATABASE_URL: postgres://govgate:govgate@postgres:5432/govgate?sslmode=disable
      GOVGATE_CHECKLIST_DIR: /checklists
    volumes:
      - ./checklists:/checklists:ro
    ports:
      - "8080:8080"
