name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.22"
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  lint-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/register
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/register/go.sum
      - name: gofmt
        run: test -z "$(gofmt -l ./cmd ./internal)"
      - name: go vet
        run: go vet ./...

  lint-py:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/reporter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry==1.8.3
      - run: poetry install
      - run: poetry run ruff check src tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/register/go.sum
      - name: go vet (typecheck)
        working-directory: apps/register
        run: go vet ./...
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pipx install poetry==1.8.3
      - name: mypy strict
        working-directory: apps/reporter
        run: |
          poetry install
          poetry run mypy

  test-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/register
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/register/go.sum
      - name: unit tests
        run: go test ./...
      - name: coverage gate (engine packages)
        run: |
          go test -coverprofile=coverage.out ./internal/checklist/... ./internal/scoring/...
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3,1,length($3)-1)}')
          echo "engine coverage: $total%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 75) ? 0 : 1 }'

  test-py:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: apps/reporter
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pipx install poetry==1.8.3
      - run: poetry install
      - name: pytest with coverage gate
        run: poetry run pytest --cov --cov-report=term-missing --cov-fail-under=85

  test-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/register
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/register/go.sum
      - name: integration tests (testcontainers postgres)
        run: go test -tags=integration -timeout 600s ./...

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-go, lint-py, typecheck, test-go, test-py]
    steps:
      - uses: actions/checkout@v4
      - name: build register image
        run: docker build -t govgate-register ./apps/register
      - name: build reporter image
        run: docker build -t govgate-reporter ./apps/reporter
