version: "1.0.0"
name: strict
description: >-
  Hardened intake checklist for high-sensitivity environments. Promotes several
  requirements to critical severity and adds a no-third-party-training gate.

categories:
  - id: data_residency
    weight: 3
    requirements:
      - id: dr.region_known
        question: Is the data processing region documented?
        weight: 1
        severity: high
        auto_check: data_region_present
      - id: dr.approved_region
        question: Is data processed only in approved regions?
        weight: 3
        severity: critical
        auto_check: data_region_approved

  - id: pii_handling
    weight: 3
    requirements:
      - id: pii.declared
        question: Does the submission declare whether PII is processed?
        weight: 1
        severity: high
        auto_check: pii_flag_declared
      - id: pii.no_unmasked
        question: Is unmasked PII kept out of the tool, or masked before send?
        weight: 3
        severity: critical
        auto_check: pii_not_unmasked
      - id: pii.dpa_signed
        question: Is a data processing agreement in place with the vendor?
        weight: 2
        severity: critical

  - id: model_provenance
    weight: 2
    requirements:
      - id: mp.family_known
        question: Is the underlying model family disclosed?
        weight: 1
        severity: high
        auto_check: model_family_known
      - id: mp.no_customer_training
        question: Is customer data excluded from model training?
        weight: 3
        severity: critical
        auto_check: no_customer_training

  - id: retention
    weight: 2
    requirements:
      - id: ret.policy_declared
        question: Is a data retention period declared?
        weight: 1
        severity: high
        auto_check: retention_declared
      - id: ret.bounded
        question: Is retention bounded to 30 days or less, or justified?
        weight: 2
        severity: high
        auto_check: retention_bounded

  - id: human_oversight
    weight: 2
    requirements:
      - id: ho.human_in_loop
        question: Is there human review of consequential outputs?
        weight: 2
        severity: critical

  - id: security
    weight: 3
    requirements:
      - id: sec.encryption_transit
        question: Is data encrypted in transit?
        weight: 2
        severity: critical
        auto_check: encryption_in_transit
      - id: sec.no_unvetted_subproc
        question: Are all subprocessors vetted (no unknown third parties)?
        weight: 2
        severity: high

  - id: vendor_stability
    weight: 1
    requirements:
      - id: vs.vendor_named
        question: Is the vendor named and identifiable?
        weight: 1
        severity: medium
        auto_check: vendor_named
